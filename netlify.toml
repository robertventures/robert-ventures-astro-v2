# Netlify configuration for Robert Ventures

# ========================================
# EDGE FUNCTIONS
# ========================================
# Geo-blocking is handled by the edge function in netlify/edge-functions/geo-block.js
# It blocks webinar registrations from countries outside the US

[[edge_functions]]
  path = "/api/webinar-registration"
  function = "geo-block"

[[edge_functions]]
  path = "/api/create-account"
  function = "geo-block"

# ========================================
# REDIRECTS / PROXIES
# ========================================
# Reverse proxy for RedTrack uniclick.js — serves the script from our own domain
# so Safari (ITP) and Firefox (ETP) don't block it as third-party tracking
[[redirects]]
  from = "/rtk/*"
  to = "https://rt.robertventures.com/:splat"
  status = 200
  force = true

# Reverse proxy for PostHog — routes through our domain so ad blockers can't intercept it
# /static/* must come first (more specific) to hit the assets CDN; /* catches event data
[[redirects]]
  from = "/phog/static/*"
  to = "https://us-assets.i.posthog.com/static/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/phog/*"
  to = "https://us.i.posthog.com/:splat"
  status = 200
  force = true
